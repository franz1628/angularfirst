<div class="table-card glass-morphism">
  <div class="table-responsive">
    <table class="premium-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Seller</th>
          <th>Document</th>
          <th>Contact</th>
          <th>Status</th>
          <th class="text-right">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let seller of sellers;" class="animate-fade-in">
          <td class="id-cell">#{{seller.id}}</td>
          <td>
            <div class="user-cell">
              <div class="avatar-container">
                <img [src]="seller.photo || 'assets/images/default-avatar.png'" [alt]="seller.name" class="user-avatar">
              </div>
              <div class="user-info">
                <span class="user-name">{{seller.name}} {{seller.last_name}}</span>
                <span class="user-email">{{seller.email}}</span>
              </div>
            </div>
          </td>
          <td>
            <div class="doc-info">
              <span class="doc-type">{{seller.document_type?.name}}</span>
              <span class="doc-number">{{seller.number_document}}</span>
            </div>
          </td>
          <td>
            <div class="contact-info">
              <span class="phone">{{seller.phone || '--'}}</span>
              <span class="address" [title]="seller.address">{{seller.address || 'No address'}}</span>
            </div>
          </td>
          <td>
            <span class="badge" [class.active]="seller.state === 1" [class.inactive]="seller.state !== 1">
              {{seller.state === 1 ? 'Active' : 'Inactive'}}
            </span>
          </td>
          <td class="actions-cell">
            <div class="action-buttons">
              <button class="btn-icon edit" (click)="$event.stopPropagation(); edit.emit(seller.id)" title="Edit">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
              </button>
              <button class="btn-icon delete" (click)="$event.stopPropagation(); delete.emit(seller.id)" title="Delete">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6"></polyline>
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
              </button>
            </div>
          </td>
        </tr>
        <tr *ngIf="sellers?.length === 0">
          <td colspan="6" class="empty-state">
            <div class="empty-content">
              <span class="empty-icon">🤝</span>
              <p>No sellers found.</p>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
