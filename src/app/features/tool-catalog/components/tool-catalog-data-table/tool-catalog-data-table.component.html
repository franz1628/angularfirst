<div class="table-card glass-panel">
  <div class="table-responsive">
    <table class="elite-table">
      <thead>
        <tr>
          <th>Preview</th>
          <th>Tool Name</th>
          <th>Description</th>
          <th>Status</th>
          <th class="text-right">Actions</th>
        </tr>
      </thead>
      <tbody>
        <ng-container *ngIf="!loading; else loadingState">
          <tr *ngFor="let tool of tools; trackBy: trackByToolId" [class.inactive-row]="tool.state === 0">
            <td class="preview-cell">
              <div class="tool-avatar">
                <img *ngIf="tool.photo" [src]="tool.photo" alt="Tool Photo">
                <div *ngIf="!tool.photo" class="avatar-placeholder">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a2 2 0 0 1-2.83-2.83l-3.94 3.6ZM4.7 19.3a1 1 0 0 0 0-1.4l-1.6-1.6a1 1 0 0 0-1.4 0l-1.7 1.7a2 2 0 0 0 2.83 2.83l1.87-1.53ZM10.5 10.5l4-4M4.7 14.7l4.3-4.3"></path></svg>
                </div>
              </div>
            </td>
            <td class="name-cell">
              <div class="tool-name">{{tool.name}}</div>
              <div class="tool-id">#{{tool.id}}</div>
            </td>
            <td class="desc-cell">
              <div class="description-text">{{tool.description || 'No description provided'}}</div>
            </td>
            <td>
              <span class="status-badge" [ngClass]="tool.state === 1 ? 'status-active' : 'status-inactive'">
                {{tool.state === 1 ? 'Available' : 'Unavailable'}}
              </span>
            </td>
            <td class="actions-cell text-right">
              <button class="btn-icon btn-edit" (click)="edit.emit(tool)" title="Edit">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
              </button>
              <button class="btn-icon btn-delete" (click)="delete.emit(tool.id)" title="Delete">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
              </button>
            </td>
          </tr>
          <tr *ngIf="tools?.length === 0">
            <td colspan="5" class="empty-state">
              <div class="empty-content">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                <p>No tools found in the catalog.</p>
              </div>
            </td>
          </tr>
        </ng-container>

        <ng-template #loadingState>
          <tr *ngFor="let list of [1,2,3,4,5]">
            <td colspan="5">
              <div class="skeleton-row"></div>
            </td>
          </tr>
        </ng-template>
      </tbody>
    </table>
  </div>
</div>
