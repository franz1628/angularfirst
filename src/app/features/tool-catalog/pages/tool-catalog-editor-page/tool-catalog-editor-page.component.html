<div class="editor-container animate-fade-in">
  <header class="editor-header">
    <button class="btn-back" (click)="onCancel()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      Back to Tool Catalog
    </button>
  </header>

  <main class="editor-main">
    <div class="editor-title-group">
      <h1 class="editor-title">{{ id ? 'Modify Equipment' : 'New Tool Registry' }}</h1>
      <p class="editor-subtitle">{{ id ? 'Update technical details and status of this workshop tool.' : 'Add a new high-performance tool to your workshop inventory.' }}</p>
    </div>

    <app-tool-catalog-registry
      [tool]="tool"
      (save)="onSave($event)"
      (cancel)="onCancel()">
    </app-tool-catalog-registry>
  </main>
</div>
