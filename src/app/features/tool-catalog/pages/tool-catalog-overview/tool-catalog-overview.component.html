<div class="overview-container animate-fade-in">
  <header class="overview-header">
    <div class="header-content">
      <h1 class="overview-title">Tool Catalog</h1>
      <p class="overview-subtitle">Manage your workshop tools, equipment, and availability state.</p>
    </div>
    <div class="header-actions">
      <button class="btn-primary-elite" (click)="onAdd()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        Register New Tool
      </button>
    </div>
  </header>

  <main class="overview-main">
    <section class="data-section">
      <div class="section-header">
        <h2 class="section-title">Workshop Equipment</h2>
        <div class="status-indicators">
          <span class="status-item">
            <span class="dot active"></span> 
            Inventory Live
          </span>
          <span class="status-item" *ngIf="tools$ | async as tools">
            <span class="count">{{tools.length}}</span> 
            Total Tools
          </span>
        </div>
      </div>

      <app-tool-catalog-data-table 
        [tools]="tools$ | async" 
        [loading]="loading"
        (edit)="onEdit($event)" 
        (delete)="onDelete($event)">
      </app-tool-catalog-data-table>
    </section>
  </main>
</div>
