<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
        </svg>
      </div>
      <h1>Bienvenido</h1>
      <p>Ingresa tus credenciales para continuar</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="username">Usuario</label>
        <div class="input-wrapper">
          <input type="text" id="username" formControlName="username" 
                 placeholder="admin" [class.is-invalid]="submitted && f['username'].errors">
          <div *ngIf="submitted && f['username'].errors" class="invalid-feedback">
            Se requiere el usuario.
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <input type="password" id="password" formControlName="password" 
                 placeholder="••••••••" [class.is-invalid]="submitted && f['password'].errors">
          <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
            Se requiere la contraseña.
          </div>
        </div>
      </div>

      <div *ngIf="error" class="alert alert-danger">
        {{ error }}
      </div>

      <button type="submit" class="btn-login" [disabled]="loading">
        <span *ngIf="!loading">Iniciar Sesión</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
    </form>

    <div class="login-footer">
      <p>© 2026 AngularFirst. Todos los derechos reservados.</p>
    </div>
  </div>
</div>
