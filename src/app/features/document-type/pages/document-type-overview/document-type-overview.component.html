<div class="overview-container animate-fade-in">
  <header class="overview-header">
    <div class="header-content">
      <h1 class="overview-title">Document System</h1>
      <p class="overview-subtitle">Manage valid identification documents across the entire ecosystem.</p>
    </div>
    <div class="header-actions">
      <button class="btn-primary-elite" (click)="onAdd()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        New Document Type
      </button>
    </div>
  </header>

  <main class="overview-main">
    <section class="data-section">
      <div class="section-header">
        <h2 class="section-title">Registered Types</h2>
        <div class="status-indicators">
          <span class="status-item">
            <span class="dot active"></span> 
            Syncing Live
          </span>
          <span class="status-item" *ngIf="documentTypes$ | async as types">
            <span class="count">{{types.length}}</span> 
            Total Classifications
          </span>
        </div>
      </div>

      <app-document-type-data-table 
        [documentTypes]="documentTypes$ | async" 
        [loading]="loading"
        (edit)="onEdit($event)" 
        (delete)="onDelete($event)">
      </app-document-type-data-table>
    </section>
  </main>
</div>
