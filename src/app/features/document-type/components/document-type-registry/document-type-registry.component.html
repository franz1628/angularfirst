<div class="registry-card glass-morphism animate-slide-up">
  <div class="registry-header">
    <h3 class="registry-title">{{ documentType ? 'Update Document Type' : 'New Document Type' }}</h3>
    <p class="registry-subtitle">Define and manage document classifications for system-wide identification.</p>
  </div>

  <form [formGroup]="docTypeForm" (ngSubmit)="onSubmit()" class="registry-form">
    <div class="form-grid">
      <div class="form-item full-width" [class.error]="f['name'].invalid && f['name'].touched">
        <label for="name">Type Name</label>
        <div class="input-container">
          <input id="name" type="text" formControlName="name" placeholder="e.g. Identity Card, Passport">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        </div>
        <div class="error-msg" *ngIf="f['name'].hasError('required') && f['name'].touched">The name is required.</div>
        <div class="error-msg" *ngIf="f['name'].hasError('minlength') && f['name'].touched">At least 2 characters are required.</div>
      </div>

      <div class="form-item full-width" [class.error]="f['description'].invalid && f['description'].touched">
        <label for="description">Description</label>
        <textarea id="description" formControlName="description" rows="3" placeholder="Additional details about this document type..."></textarea>
      </div>

      <div class="form-item">
        <label for="state">Status</label>
        <div class="input-container">
          <select id="state" formControlName="state">
            <option [ngValue]="1">Active</option>
            <option [ngValue]="0">Inactive</option>
          </select>
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18v18H3zM9 9l6 6M15 9l-6 6"></path></svg>
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-cancel" (click)="cancel.emit()">Cancel</button>
      <button type="submit" class="btn-save" [disabled]="docTypeForm.invalid">
        {{ documentType ? 'Update Type' : 'Save Type' }}
      </button>
    </div>
  </form>
</div>
