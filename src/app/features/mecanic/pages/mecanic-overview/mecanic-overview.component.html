<div class="page-container animate-fade-in">
  <div class="page-header">
    <div class="header-info">
      <h1 class="page-title">Elite Mechanics</h1>
      <p class="page-subtitle">Manage your expert service team and professional profiles.</p>
    </div>
    <button class="btn-add" (click)="onAdd()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      <span>Add Mechanic</span>
    </button>
  </div>

  <app-mecanic-data-table 
    [mechanics]="(mechanics$ | async) || []" 
    [loading]="loading"
    (edit)="onEdit($event)"
    (delete)="onDelete($event)">
  </app-mecanic-data-table>
</div>
