<div class="overview-container animate-fade-in">
  <header class="overview-header">
    <div class="header-content">
      <h1 class="overview-title">Portfolio Overview</h1>
      <p class="overview-subtitle">View and manage your global manufacturer identifiers and heritage data.</p>
    </div>
    <div class="header-actions">
      <button class="btn-primary-elite" (click)="onAdd()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        Register New Brand
      </button>
    </div>
  </header>

  <main class="overview-main">
    <section class="data-section">
      <div class="section-header">
        <h2 class="section-title">Manufacturer Inventory</h2>
        <div class="status-indicators">
          <span class="status-item">
            <span class="dot active"></span>
            Syncing Live
          </span>
          <span class="status-item" *ngIf="getBrands | async as brands">
            <span class="count">{{brands.length}}</span>
            Total Entries
          </span>
        </div>
      </div>

      <div class="search-container">
        <input type="text" class="form-control" [value]="searchTerm" (input)="onSearch($event)" placeholder="Search" />
      </div>

      <app-brand-data-table [brands]="getBrands | async" [loading]="loading" (edit)="onEdit($event)"
        (delete)="onDelete($event)">
      </app-brand-data-table>
    </section>
  </main>
</div>
