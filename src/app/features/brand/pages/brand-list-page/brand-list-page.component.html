<div class="hero-section">
  <h1 class="hero-title">Brands Distribution</h1>
  <p class="hero-subtitle">Manage your premium product categories and artisan identifiers with ease.</p>
</div>

<div class="glass-card">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="mb-0">Current Brands</h3>
    <div class="d-flex align-items-center gap-3">
      <span class="badge rounded-pill bg-light text-primary px-3 py-2 border" *ngIf="brands$ | async as brands">Total: {{brands.length}}</span>
      <button class="btn btn-primary-elite" (click)="onAdd()">
        + Register New Brand
      </button>
    </div>
  </div>
  
  <app-brand-list 
    *ngIf="brands$ | async as brands"
    [brands]="brands" 
    (edit)="onEdit($event)"
    (delete)="onDelete($event)">
  </app-brand-list>
</div>
