<form (ngSubmit)="onSave()">
    <div class="row">
        <div class="col-md-12 mb-4">
            <label for="name" class="form-label text-uppercase small tracking-wider">Brand Name</label>
            <input type="text" [(ngModel)]="brand.name" name="name" class="form-control" id="name"
                placeholder="e.g. Toyota" required>
        </div>
    </div>

    <div class="mb-4">
        <label for="description" class="form-label text-uppercase small tracking-wider">Description</label>
        <textarea [(ngModel)]="brand.description" name="description" class="form-control" id="description" rows="3"
            placeholder="e.g. Marca japonesa de automóviles"></textarea>
    </div>

    <div class="row">
        <div class="col-md-8 mb-4">
            <label for="logo" class="form-label text-uppercase small tracking-wider">Logo URL</label>
            <input type="text" [(ngModel)]="brand.logo" name="logo" class="form-control" id="logo"
                placeholder="https://...">
        </div>
        <div class="col-md-4 mb-4">
            <label for="state" class="form-label text-uppercase small tracking-wider">State</label>
            <select [(ngModel)]="brand.state" name="state" class="form-select" id="state">
                <option [ngValue]="1">Active</option>
                <option [ngValue]="0">Inactive</option>
            </select>
        </div>
    </div>

    <div class="d-grid gap-2">
        <button type="submit" class="btn btn-primary-elite">
            {{ brand.id > 0 ? 'Update Brand' : 'Register Brand' }}
        </button>
    </div>
</form>
