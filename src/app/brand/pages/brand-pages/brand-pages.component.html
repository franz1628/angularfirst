<div class="hero-section">
  <h1 class="hero-title">Brands Distribution</h1>
  <p class="hero-subtitle">Manage your premium product categories and artisan identifiers with ease.</p>
</div>

<div class="row g-4">
  <div class="col-lg-4">
    <div class="glass-card h-100">
      <h3 class="mb-4">Register New Brand</h3>
      <app-brand-form (add)="add($event)"></app-brand-form>
    </div>
  </div>
  <div class="col-lg-8">
    <div class="glass-card">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="mb-0">Current Brands</h3>
        <span class="badge rounded-pill bg-light text-primary px-3 py-2 border">Total: {{brands.length}}</span>
      </div>
      <app-brand-list [brands]="brands" (delete)="delete($event)"></app-brand-list>
    </div>
  </div>
</div>
