<form (ngSubmit)="emit()">
    <div class="mb-4">
        <label for="description" class="form-label text-uppercase small tracking-wider">Description</label>
        <input type="text" [(ngModel)]="brand.description" name="description" class="form-control" id="description" placeholder="e.g. Masterwork">
    </div>
    <div class="d-grid">
        <button type="submit" class="btn btn-primary-elite">Add Brand</button>
    </div>
</form>
