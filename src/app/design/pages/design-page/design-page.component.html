<div class="hero-section">
  <h1 class="hero-title">Creative Designs</h1>
  <p class="hero-subtitle">Visual concepts and structural frameworks for your artisan projects.</p>
</div>

<div class="row g-4">
  <div class="col-lg-4">
    <div class="glass-card h-100">
      <h4 class="mb-4">New Concept</h4>
      <app-design-form (add)="add($event)"></app-design-form>
    </div>
  </div>
  <div class="col-lg-8">
    <div class="glass-card">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">Design Library</h4>
        <div class="badge rounded-pill bg-white text-primary px-3 py-2 border">Total: {{designs.length}}</div>
      </div>
      <app-design-list [designs]="designs" (delete)="delete($event)"></app-design-list>
    </div>
  </div>
</div>
