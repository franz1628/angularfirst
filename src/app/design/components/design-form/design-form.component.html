<form (ngSubmit)="emit()">
    <div class="mb-4">
        <label for="description" class="form-label text-uppercase small tracking-wider">Concept Name</label>
        <input type="text" [(ngModel)]="design.description" name="description" class="form-control" id="description" placeholder="e.g. Neo-Gothic">
    </div>
    <div class="d-grid">
        <button type="submit" class="btn btn-primary-elite">Create Design</button>
    </div>
</form>
