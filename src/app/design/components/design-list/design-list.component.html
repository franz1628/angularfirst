<div class="table-container">
    <table class="custom-table mb-0">
        <thead>
            <tr>
                <th class="w-25">ID</th>
                <th>Concept Description</th>
                <th class="text-end">Actions</th>
            </tr>
        </thead>
        <tbody>
            <ng-container *ngIf="designs.length > 0; else noRecords">
                <tr *ngFor="let design of designs">
                    <td class="fw-bold text-accent opacity-75">#{{design.id}}</td>
                    <td class="fw-medium text-dark">{{design.description}}</td>
                    <td class="text-end">
                        <button class="btn btn-danger-elite" type="button" (click)="emitDelete(design.id)">
                            Archive
                        </button>
                    </td>
                </tr>
            </ng-container>
            <ng-template #noRecords>
                <tr>
                    <td colspan="3" class="text-center py-5 text-muted fst-italic">
                        No designs currently in the library.
                    </td>
                </tr>
            </ng-template>
        </tbody>
    </table>
</div>
