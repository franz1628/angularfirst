<div class="app-layout" [class.with-sidebar]="authService.currentUser$ | async" [class.collapsed]="isSidebarCollapsed" [class.mobile-open]="isMobileMenuOpen">
  
  <!-- Sidebar -->
  <aside class="sidebar-premium" *ngIf="authService.currentUser$ | async">
    <div class="sidebar-header">
      <div class="brand-container">
        <div class="brand-logo">EC</div>
        <span class="brand-name">EliteCraft</span>
      </div>
      <button class="btn-toggle" (click)="toggleSidebar()">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 18l-6-6 6-6" *ngIf="!isSidebarCollapsed"></path>
          <path d="M9 18l6-6-6-6" *ngIf="isSidebarCollapsed"></path>
        </svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">
        <span class="section-label">General</span>
        
        <a routerLink="/brand" routerLinkActive="active" class="side-link" title="Brands">
          <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
          <span class="link-text">Brands</span>
        </a>

        <a routerLink="/design" routerLinkActive="active" class="side-link" title="Designs">
          <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 8l4 4-4 4-4-4 4-4z"></path></svg>
          <span class="link-text">Designs</span>
        </a>

        <a routerLink="/person" routerLinkActive="active" class="side-link" title="Vehicle Owners">
          <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
          <span class="link-text">Vehicle Owners</span>
        </a>
      </div>

      <div class="nav-section">
        <span class="section-label">Administration</span>

        <a routerLink="/mecanic" routerLinkActive="active" class="side-link" title="Mechanics">
          <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
          <span class="link-text">Mechanics</span>
        </a>

        <a routerLink="/document-type" routerLinkActive="active" class="side-link" title="Document Types">
          <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          <span class="link-text">Document Types</span>
        </a>

        <a routerLink="/service-catalog" routerLinkActive="active" class="side-link" title="Service Catalog">
          <svg class="link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
          <span class="link-text">Service Catalog</span>
        </a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <button (click)="logout()" class="btn-logout-sidebar" title="Cerrar Sesión">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"></path>
        </svg>
        <span class="link-text">Cerrar Sesión</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="mobile-header" *ngIf="authService.currentUser$ | async">
      <div class="mobile-brand">EliteCraft</div>
      <button class="btn-mobile-menu" (click)="isMobileMenuOpen = !isMobileMenuOpen">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
    </header>

    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>
  </main>

  <!-- Mobile Overlay Menu (Optional/Simple implementation) -->
  <div class="mobile-overlay" *ngIf="isMobileMenuOpen" (click)="isMobileMenuOpen = false"></div>
</div>
